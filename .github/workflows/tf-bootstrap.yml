name: Terraform Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    name: Create Terraform Backend
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-northeast-1' }}
      BUCKET_NAME: rcoauth2ast-terraform-state
      DYNAMO_TABLE: rcoauth2ast-terraform-locks

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 bucket if missing
        shell: bash
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Bucket $BUCKET_NAME already exists."
          else
            echo "Creating S3 bucket: $BUCKET_NAME in $AWS_REGION"
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$AWS_REGION"
            else
              aws s3api create-bucket \
                --bucket "$BUCKET_NAME" \
                --region "$AWS_REGION" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
          fi

      - name: Enable S3 versioning
        shell: bash
        run: |
          set -euo pipefail
          aws s3api put-bucket-versioning \
            --bucket "$BUCKET_NAME" \
            --versioning-configuration Status=Enabled

      - name: Enable S3 default encryption
        shell: bash
        run: |
          set -euo pipefail
          aws s3api put-bucket-encryption \
            --bucket "$BUCKET_NAME" \
            --server-side-encryption-configuration '{
              "Rules": [
                {
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "AES256"
                  }
                }
              ]
            }'

      - name: Block S3 public access
        shell: bash
        run: |
          set -euo pipefail
          aws s3api put-public-access-block \
            --bucket "$BUCKET_NAME" \
            --public-access-block-configuration '{
              "BlockPublicAcls": true,
              "IgnorePublicAcls": true,
              "BlockPublicPolicy": true,
              "RestrictPublicBuckets": true
            }'

      - name: Create DynamoDB lock table if missing
        shell: bash
        run: |
          set -euo pipefail

          if aws dynamodb describe-table --table-name "$DYNAMO_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "DynamoDB table $DYNAMO_TABLE already exists."
          else
            echo "Creating DynamoDB table: $DYNAMO_TABLE"
            aws dynamodb create-table \
              --table-name "$DYNAMO_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"

            aws dynamodb wait table-exists \
              --table-name "$DYNAMO_TABLE" \
              --region "$AWS_REGION"
          fi

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Terraform Backend Bootstrap Complete"
            echo ""
            echo "- Region: $AWS_REGION"
            echo "- S3 Bucket: $BUCKET_NAME"
            echo "- DynamoDB Lock Table: $DYNAMO_TABLE"
          } >> "$GITHUB_STEP_SUMMARY"
